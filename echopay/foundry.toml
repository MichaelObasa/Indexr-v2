[profile.default]
solc_version = "0.8.30"

# EchoPay sources live here
src = "contracts"

# EchoPay tests live here
test = "test"

# Use contracts/lib (shared deps with main Indexr contracts)
libs = ["../contracts/lib"]

remappings = [
    "@openzeppelin/contracts/=../contracts/lib/openzeppelin-contracts/contracts/",
    "forge-std/=../contracts/lib/forge-std/src/"
]
